- name: Reload Crowdsec
  ansible.builtin.systemd_service:
    name: crowdsec
    state: reloaded
  become: true

- name: Restart Crowdsec
  ansible.builtin.systemd_service:
    name: crowdsec
    state: restarted
  become: true

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
  become: true
