---
- name: Bootstrap servers
  hosts: all

  tasks:
    - name: Verify that the host is running a supported Debian version (12 or 13)
      ansible.builtin.fail:
        msg: >
          {{ ansible_facts["distribution"] }} is not supported by these playbooks.
          Only Debian 12/13 are supported.
      when: >
        ansible_facts["distribution"] != "Debian" or
        ansible_facts["distribution_major_version"] not in ["12", "13"]

    - name: Include common system bootstrap role
      ansible.builtin.include_role:
        name: common

    - name: Apply DevSec OS security hardening role
      ansible.builtin.include_role:
        name: devsec.hardening.os_hardening
        apply:
          become: true
      vars:
        sysctl_overwrite:
          net.ipv4.ip_forward: 1
        os_auditd_enabled: false
        os_user_pw_ageing: false
        os_auth_pw_max_age: 99999
        os_auth_pw_min_age: 0

    - name: Apply DevSec SSH security hardening role
      ansible.builtin.include_role:
        name: devsec.hardening.ssh_hardening
        apply:
          become: true
      vars:
        ssh_server_password_login: "{{ enable_ssh_password | default(false) | bool }}"
        sshd_authenticationmethods: "{{ 'publickey password' if (enable_ssh_password | default(false) | bool) else 'publickey' }}"
