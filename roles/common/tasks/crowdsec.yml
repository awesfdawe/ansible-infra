---
- name: Configure CrowdSec package repository
  ansible.builtin.deb822_repository:
    name: crowdsec
    types: deb
    uris: https://packagecloud.io/crowdsec/crowdsec/any
    suites: any
    components: main
    signed_by: https://packagecloud.io/crowdsec/crowdsec/gpgkey
  become: true

- name: Install CrowdSec security engine package
  ansible.builtin.apt:
    name: crowdsec
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Enable and start CrowdSec security service
  ansible.builtin.systemd_service:
    name: crowdsec
    enabled: true
    state: started
  become: true

- name: Wait for CrowdSec LAPI port to become available
  ansible.builtin.wait_for:
    port: 8080
    delay: 2
    timeout: 30

- name: Install CrowdSec firewall bouncer nftables package
  ansible.builtin.apt:
    name: crowdsec-firewall-bouncer-nftables
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Enable and start CrowdSec firewall bouncer service
  ansible.builtin.systemd_service:
    name: crowdsec-firewall-bouncer
    enabled: true
    state: started
  become: true
