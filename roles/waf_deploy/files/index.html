<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tyto alba</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body,
      html {
        margin: 0;
        padding: 0;
      }

      .vp-section {
        width: 100%;
        height: 100dvh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        position: relative;
      }

      video {
        max-width: 100%;
        max-height: 100%;
        width: auto;
        height: auto;
        display: block;
      }

      img {
        width: 100%;
        height: 100%;
        object-fit: contain;
        display: block;
      }

      .spacer {
        height: 2000vh;
      }
    </style>
  </head>

  <body>
    <div class="vp-section">
      <video controls autoplay loop>
        <source src="https://files.catbox.moe/80b670.mp4" type="video/mp4" />
      </video>
    </div>

    <div class="spacer"></div>

    <div class="vp-section">
      <img src="https://files.catbox.moe/2163k2.jpg" />
    </div>
  </body>
</html>
