---
- name: Reload Nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: reloaded
  become: true

- name: Restart Nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
  become: true

- name: Reload Crowdsec
  ansible.builtin.systemd_service:
    name: crowdsec
    state: reloaded
  become: true

- name: Restart Crowdsec
  ansible.builtin.systemd_service:
    name: crowdsec
    state: restarted
  become: true

- name: Restart Wireguard
  ansible.builtin.systemd_service:
    name: wg-quick@wg0
    state: restarted
  become: true
