---
- name: Reload Nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: reloaded
  become: true

- name: Restart Nginx
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
  become: true

- name: Reload Crowdsec
  ansible.builtin.systemd_service:
    name: nginx
    state: reloaded
  become: true

- name: Restart Crowdsec
  ansible.builtin.systemd_service:
    name: nginx
    state: restarted
  become: true
