---
- name: Install Nginx package and Lua module
  ansible.builtin.apt:
    pkg:
      - nginx
      - libnginx-mod-http-lua
    update_cache: true
    cache_valid_time: 3600
  become: true

- name: Create maps directory for Nginx
  ansible.builtin.file:
    path: /etc/nginx/maps
    state: directory
    owner: root
    group: root
    mode: "0755"
  become: true

- name: Check if bad user agents map file exists
  ansible.builtin.stat:
    path: /etc/nginx/maps/bad_user_agents.map
  register: waf_deploy_bad_user_agents_file

- name: Download initial bad user agents map file
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/awesfdawe/nginx-misc/refs/heads/main/bad_user_agents.map
    dest: /etc/nginx/maps/bad_user_agents.map
    owner: root
    group: root
    mode: "0644"
  when: not waf_deploy_bad_user_agents_file.stat.exists
  become: true

- name: Deploy Systemd service for automatic bad user agents map updates
  ansible.builtin.copy:
    src: nginx/update_bad_user_agents_map.service
    dest: /etc/systemd/system/update_bad_user_agents_map.service
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Deploy Systemd timer for bad user agents map updates
  ansible.builtin.copy:
    src: nginx/update_bad_user_agents_map.timer
    dest: /etc/systemd/system/update_bad_user_agents_map.timer
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Enable and start Systemd timer for bad user agents map updates
  ansible.builtin.systemd_service:
    name: update_bad_user_agents_map.timer
    enabled: true
    state: started
    daemon_reload: true
  become: true

- name: Install CrowdSec Nginx bouncer package
  ansible.builtin.apt:
    name: crowdsec-nginx-bouncer
    update_cache: true
    cache_valid_time: 3600
  notify: Restart Nginx
  become: true

- name: Install CrowdSec AppSec security collections
  ansible.builtin.command:
    cmd: "cscli collections install {{ item }}"
    creates: "/etc/crowdsec/collections/{{ item | basename }}.yaml"
  loop:
    - crowdsecurity/appsec-virtual-patching
    - crowdsecurity/appsec-generic-rules
    - crowdsecurity/nginx
  notify: Reload Crowdsec
  become: true

- name: Configure CrowdSec acquisition sources
  ansible.builtin.copy:
    src: crowdsec/{{ item }}.yaml
    dest: /etc/crowdsec/acquis.d/{{ item }}.yaml
    owner: root
    group: root
    mode: "0644"
  loop:
    - appsec
    - nginx
  notify: Restart Crowdsec
  become: true

- name: Configure CrowdSec Nginx bouncer AppSec settings
  community.general.ini_file:
    path: /etc/crowdsec/bouncers/crowdsec-nginx-bouncer.conf
    section: null
    option: "{{ item.key }}"
    value: "{{ item.value }}"
    no_extra_spaces: true
    owner: root
    group: root
    mode: "0644"
    create: false
  loop:
    - { key: APPSEC_URL, value: http://127.0.0.1:7422 }
    - { key: APPSEC_FAILURE_ACTION, value: deny }
  notify: Restart Nginx
  become: true

- name: Deploy Nginx main configuration file
  ansible.builtin.template:
    src: nginx/nginx.conf.j2
    dest: /etc/nginx/nginx.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx
  become: true

- name: Deploy Nginx proxy settings configuration snippet
  ansible.builtin.template:
    src: nginx/proxy-snippet.conf.j2
    dest: /etc/nginx/snippets/proxy.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx
  become: true

- name: Deploy Nginx security headers configuration snippet
  ansible.builtin.copy:
    src: nginx/headers-snippet.conf
    dest: /etc/nginx/snippets/headers.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx
  become: true

- name: Deploy Nginx global fallback server configuration
  ansible.builtin.template:
    src: nginx/sites/global.conf.j2
    dest: /etc/nginx/conf.d/global.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx
  become: true

- name: Enable and start Nginx service
  ansible.builtin.systemd_service:
    name: nginx
    enabled: true
    state: started
  become: true

- name: Allow HTTP and HTTPS traffic through Firewalld
  ansible.posix.firewalld:
    service: "{{ item }}"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - http
    - https
  become: true

- name: Flush handlers to apply configuration changes immediately
  ansible.builtin.meta: flush_handlers
