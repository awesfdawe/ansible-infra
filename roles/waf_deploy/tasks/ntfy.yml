---
- name: Deploy ntfy server configuration file
  ansible.builtin.template:
    src: ntfy-server.yml.j2
    dest: /etc/ntfy/server.yml
    owner: root
    group: root
    mode: "0644"
  become: true

- name: Ensure required cache and state directories exist for ntfy
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: _ntfy
    group: _ntfy
    mode: "0755"
  loop:
    - /var/cache/ntfy/attachments
    - /var/lib/ntfy
  become: true

- name: Enable and start ntfy messaging service
  ansible.builtin.systemd_service:
    name: ntfy
    enabled: true
    state: started
  become: true

- name: Deploy Nginx virtual host configuration for ntfy
  ansible.builtin.template:
    src: nginx/sites/ntfy.conf.j2
    dest: /etc/nginx/conf.d/ntfy.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload Nginx
  become: true
